version: '3.8'

services:
  # MongoDB for Kisan Mitra conversation logs and farming tips
  mongodb:
    image: mongo:7.0
    container_name: bharat-mandi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=bharat_mandi
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/bharat_mandi --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for translation caching
  redis:
    image: redis:7-alpine
    container_name: bharat-mandi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL with pgvector for RAG
  postgres:
    image: ankane/pgvector:latest
    container_name: bharat-mandi-postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=bharat_mandi
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=PGSql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
