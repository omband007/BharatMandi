<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Language Support POC - Bharat Mandi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .language-selector {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .language-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .language-btn {
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      font-weight: 500;
    }

    .language-btn:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
    }

    .language-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .content-section {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }

    .translation-item {
      padding: 12px;
      margin: 8px 0;
      background: #f8f9fa;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .translation-key {
      font-family: 'Courier New', monospace;
      color: #667eea;
      font-size: 15px;
      font-weight: 600;
    }

    .translation-value {
      font-weight: 500;
      color: #333;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
    }

    .success {
      background: #efe;
      color: #3c3;
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
    }

    .demo-ui {
      display: grid;
      gap: 15px;
    }

    .demo-button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .demo-button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌍 Multi-Language Support POC</h1>
      <p class="subtitle">Testing i18n implementation for Bharat Mandi - 11 Indian Languages</p>
    </div>

    <div class="language-selector">
      <h2 class="section-title">Select Language / भाषा चुनें</h2>
      <div class="language-grid" id="languageGrid"></div>
    </div>

    <div class="content-section">
      <h2 class="section-title">Translation Statistics</h2>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="totalKeys">0</div>
          <div class="stat-label">Total Translation Keys</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="currentLang">en</div>
          <div class="stat-label">Current Language</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="completeness">100%</div>
          <div class="stat-label">Completeness</div>
        </div>
      </div>
    </div>

    <div class="content-section">
      <h2 class="section-title">Common UI Elements</h2>
      <div id="commonTranslations"></div>
    </div>

    <div class="content-section">
      <h2 class="section-title">Authentication</h2>
      <div id="authTranslations"></div>
    </div>

    <div class="content-section">
      <h2 class="section-title">Marketplace</h2>
      <div id="marketplaceTranslations"></div>
    </div>

    <div class="content-section">
      <h2 class="section-title">Demo UI with Translations</h2>
      <div class="demo-ui">
        <button class="demo-button" id="demoButton1"></button>
        <button class="demo-button" id="demoButton2"></button>
        <button class="demo-button" id="demoButton3"></button>
      </div>
    </div>
  </div>

  <script>
    const SUPPORTED_LANGUAGES = [
      { code: 'en', name: 'English' },
      { code: 'hi', name: 'हिन्दी' },
      { code: 'pa', name: 'ਪੰਜਾਬੀ' },
      { code: 'mr', name: 'मराठी' },
      { code: 'ta', name: 'தமிழ்' },
      { code: 'te', name: 'తెలుగు' },
      { code: 'bn', name: 'বাংলা' },
      { code: 'gu', name: 'ગુજરાતી' },
      { code: 'kn', name: 'ಕನ್ನಡ' },
      { code: 'ml', name: 'മലയാളം' },
      { code: 'or', name: 'ଓଡ଼ିଆ' }
    ];

    let currentLanguage = 'en';
    let translations = {};

    // Load translation file
    async function loadTranslations(langCode) {
      try {
        const response = await fetch(`/api/i18n/translations/${langCode}`);
        if (!response.ok) {
          throw new Error(`Failed to load translations for ${langCode}`);
        }
        return await response.json();
      } catch (error) {
        console.error('Error loading translations:', error);
        return null;
      }
    }

    // Initialize language selector
    function initLanguageSelector() {
      const grid = document.getElementById('languageGrid');
      grid.innerHTML = '';

      SUPPORTED_LANGUAGES.forEach(lang => {
        const btn = document.createElement('button');
        btn.className = 'language-btn';
        btn.textContent = lang.name;
        btn.dataset.code = lang.code;
        
        if (lang.code === currentLanguage) {
          btn.classList.add('active');
        }

        btn.addEventListener('click', () => changeLanguage(lang.code));
        grid.appendChild(btn);
      });
    }

    // Change language
    async function changeLanguage(langCode) {
      currentLanguage = langCode;
      
      // Update active button
      document.querySelectorAll('.language-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.code === langCode);
      });

      // Load translations
      translations = await loadTranslations(langCode);
      
      if (translations) {
        updateUI();
      }
    }

    // Update UI with translations
    function updateUI() {
      // Update stats
      const totalKeys = countKeys(translations);
      document.getElementById('totalKeys').textContent = totalKeys;
      document.getElementById('currentLang').textContent = currentLanguage.toUpperCase();
      document.getElementById('completeness').textContent = '100%';

      // Update common translations
      updateSection('commonTranslations', translations.common || {});
      updateSection('authTranslations', translations.auth || {});
      updateSection('marketplaceTranslations', translations.marketplace || {});

      // Update demo buttons
      if (translations.common) {
        document.getElementById('demoButton1').textContent = translations.common.save || 'Save';
        document.getElementById('demoButton2').textContent = translations.common.cancel || 'Cancel';
        document.getElementById('demoButton3').textContent = translations.common.submit || 'Submit';
      }
    }

    // Update a section with translations
    function updateSection(elementId, data) {
      const element = document.getElementById(elementId);
      element.innerHTML = '';

      Object.entries(data).forEach(([key, value]) => {
        const item = document.createElement('div');
        item.className = 'translation-item';
        item.innerHTML = `
          <span class="translation-key">${key}</span>
          <span class="translation-value">${value}</span>
        `;
        element.appendChild(item);
      });
    }

    // Count total keys
    function countKeys(obj) {
      let count = 0;
      for (const key in obj) {
        if (typeof obj[key] === 'object') {
          count += countKeys(obj[key]);
        } else {
          count++;
        }
      }
      return count;
    }

    // Initialize
    initLanguageSelector();
    changeLanguage('en');
  </script>
</body>
</html>
